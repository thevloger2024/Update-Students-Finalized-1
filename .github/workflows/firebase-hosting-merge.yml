# Updated: Fixed env variables, added Node.js 20, nodemailer support

name: Deploy to Firebase Hosting on merge

'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Primary key for server.ts
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Fallback - also pass as VITE_ prefix for Vite client-side if needed
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0720728369 }}'
          channelId: live
          projectId: gen-lang-client-0720728369

      - name: Deploy Firestore Rules
        run: |
          cat << 'EOF' > service-account.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0720728369 }}
          EOF
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          npx firebase-tools deploy --only firestore:rules --project gen-lang-client-0720728369
          rm -f service-account.json
